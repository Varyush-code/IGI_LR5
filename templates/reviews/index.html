<h1>Отзывы</h1>

{% if user.is_authenticated %}
    <a href="/reviews/create/">Добавить отзыв</a>

{% else %}
    <a href="/accounts/login/">Войти, чтобы оставить отзыв</a>
{% endif %}

<hr>

{% for review in reviews %}

    <div>
        <h3>{{ review.user.username }}</h3>
        <p>Оценка: {{ review.rating }}/5</p>
        <p>{{ review.text }}</p>
        <p>{{ review.created_at }}</p>
    </div>
    <hr>

{% endfor %}
